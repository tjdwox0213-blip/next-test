<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>😔😔</title>

<style>
    body {
        text-align: center;
        margin-top: 100px;
        font-family: Arial;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        margin: 10px;
        cursor: pointer;
        border-radius: 10px;
        border: none;
    }

    #yes {
        background-color: lightgreen;
    }

    #no {
        background-color: lightcoral;
        position: absolute;
    }
</style>
</head>

<body>

<h1>김승은은 바보입니까?</h1>

<button id="yes">네</button>
<button id="no">아니요</button>

<script>
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");

    // NO 버튼 도망가기
    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * window.innerWidth - 100;
        const y = Math.random() * window.innerHeight - 50;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    // YES 버튼 클릭 시
    yesBtn.addEventListener("click", () => {
        document.body.innerHTML = "<h1>정답!</h1>";
    });
</script>

</body>
</html>
